name: lint
on:
  pull_request:
    branches:
      - main
      - master
      - version/6
  push:
    branches:
      - main
      - master
      - version/6
jobs:
  forge-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Check linting
        run: forge fmt --check